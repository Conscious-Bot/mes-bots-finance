# ════════════════════════════════════════════════════════════════════════════
# RÈGLE DE LECTURE (non négociable — réconcilie trous & précision)
#
#   • layer_primary  → COMPTE (poids d'une couche, somme à 100% sur le dashboard).
#   • layer (liste)  → COUVRE (détection de trous, ne somme pas).
#   • TROU = une sous-couche absente de la liste `layer` de TOUTE position held —
#            même si elle est le primary de personne.
#       → networking/chip_interconnect COUVERT (Astera primary + Broadcom secondaire) : PAS un trou.
#       → energy/transmission COUVERT en held (Schneider primary + GEV secondaire) : PAS un trou.
#       → assembly/substrate & substrate_film : couverts seulement en PLANNED (Ibiden, Ajinomoto) : TROU.
#       → assembly/molding_equip : dans AUCUNE liste held ni planned : TROU ouvert (Towa).
#
# NOTE concentration : driver=ai_capex held inclut la DEMANDE (AMZN/GOOGL hyperscalers)
#   ET l'OFFRE qui la sert. Pari à variable unique assumé. Le chiffre ne MONTE pas vs
#   le risk-side (kill_switch comptait déjà ces tickers) — il devient VISIBLE sur les
#   pages Positions/Concentration. C'est l'alignement UI↔risk, pas un changement de poids.

# ════════════════════════════════════════════════════════════════════════════
# AGRÉGATION HIGH-LEVEL — catégorie-mère → bucket Brier (5 buckets, Phase 3/C).
#   Source unique pour intelligence/brier_audit.py + /review TICKER cyclicality
#   + benchmark_tracker, dérivée de ce mapping (config/sectors.yaml meurt après).
# ════════════════════════════════════════════════════════════════════════════
sector_highlevel_buckets:
  # categorie-mere du layer → bucket high-level affiché
  design:                 semis
  capital_equipment:      semis
  materials:              semis
  manufacturing:          semis
  assembly:               semis
  memory:                 semis
  compute:                semis            # asic + hyperscaler agrégés ici (NOTE : hyperscaler = client final mais Brier-side reste semis-supply-chain)
  networking:             semis
  energy:                 defense_industrials_eu   # power & électrification — bucket "défense/industriels" pour l'instant (à raffiner si volume)
  resources:              energy_commodities
  sovereignty:            defense_industrials_eu
  aerospace:              defense_industrials_eu
  robotics:               defense_industrials_eu   # Harmonic Drive en attendant un bucket dédié
