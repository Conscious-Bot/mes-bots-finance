# PRESAGE — Taxonomie unifiée & mapping des positions
# Source de vérité UNIQUE. Toutes les pages du dashboard (Positions, Concentration,
# géo, trous) lisent CE fichier. Aucune page ne dérive sa propre catégorisation.
# Le vault Obsidian utilise les MÊMES valeurs comme tags (#layer/..., #driver/..., #geo/...).
#
# Figé le 2026-06-26. v2 : book actif = 26 held (STM sorti) + 7 planned réels.
# v2 ajoute compute/hyperscaler (AMZN, GOOGL) + GEV/SU.PA (energy) + corrige IFX -> IFX.DE.
# ──────────────────────────────────────────────────────────────────────────────

# ════════════════════════════════════════════════════════════════════════════
# AXE 1 — layer  (FONCTION dans la chaîne ; catégorie-mère = tissu liant,
#                 sous-catégorie = précision. Multi-valeur : chevauchement = info de trou.)
# ════════════════════════════════════════════════════════════════════════════
layers:
  design:                      # concevoir le produit
    - eda                      #   outils de conception
    - ip_cores                 #   blocs IP / architectures
  capital_equipment:           # fabriquer (machines lourdes de production)
    - litho                    #   lithographie
    - metrology                #   métrologie / mesure
    - inspection               #   inspection (défauts, masques actiniques)
    - test                     #   test ATE
    - deposition_etch          #   dépôt / gravure
  materials:                   # la matière transformée
    - wafer                    #   substrat silicium
    - process_chemicals        #   gaz / chimie procédé
    - rare_earths              #   terres rares / aimants
    - multimetal               #   cuivre / multimétal / recyclage
  manufacturing:               # transformer (le procédé sous contrat)
    - foundry_leading          #   fonderie de pointe
    - idm_analog               #   fondeur-fabless analog/MCU (STM sorti — gardé au vocabulaire)
  assembly:                    # assembler / intégrer physiquement (back-end)
    - bonding_equip            #   équipement de bonding
    - cowos                    #   CoWoS / interposer / advanced packaging
    - substrate                #   substrat FC-BGA
    - substrate_film           #   film diélectrique (ABF)
    - molding_equip            #   équipement de moulage / encapsulation
  memory:                      # stocker l'information
    - hbm                      #   mémoire haute bande passante
    - dram_nand                #   (réservé : DRAM / NAND / stockage)
  compute:                     # traiter l'information OU en financer la demande
    - asic                     #   ASIC / accelerator / custom silicon
    - hyperscaler              #   acheteur final (finance la demande, pas un maillon)
    - gpu                      #   (réservé)
    - cpu                      #   (réservé)
  networking:                  # déplacer l'information
    - optical                  #   optique / transceivers
    - chip_interconnect        #   interconnexion de puces
    - satellite                #   constellation satellite
    - telecom                  #   (réservé : télécom terrestre)
  energy:                      # alimenter / convertir / mouvoir
    - generation               #   génération (turbines, nucléaire civil)
    - transmission             #   transport / grid (câbles, équipement électrique)
    - power_semis              #   semi de puissance
  resources:                   # énergie / matière brute négociée
    - lng                      #   gaz naturel liquéfié
    - uranium                  #   combustible nucléaire
  sovereignty:                 # actifs stratégiques d'État
    - defense_aero             #   défense / aéronautique souveraine
  aerospace:                   # accès & opérations spatiales / aéro
    - launch                   #   lancement / spatial
  robotics:                    # automatisation physique / embodied
    - actuation                #   actionnement de précision
    - reducers                 #   (réservé : réducteurs RV)
    - sensing                  #   (réservé)
  # datacenter_infra:          # (réservé — créer si VRT/Vertiv entre au book : thermal_power)

# ════════════════════════════════════════════════════════════════════════════
# AXE 2 — driver  (VARIABLE DE RISQUE : ce qui corrèle. Sizing/concentration. Unique.)
# ════════════════════════════════════════════════════════════════════════════
drivers:
  - ai_capex                   # variable-maître (compute, hyperscaler-demande, equip,
                               #   foundry, memory, packaging, networking-DC, power-for-AI)
  - sovereignty                # défense / souveraineté
  - resources_energy           # LNG, uranium, énergie brute
  - commodities                # métaux / matières (incl. multimétal)
  - space                      # exposition spatiale propre
  - robotics                   # automatisation / embodied
  - auto_industrial            # cycle auto / industriel (hors datacenter)
  - financials                 # (réservé)
  - crypto                     # (réservé)

# ════════════════════════════════════════════════════════════════════════════
# AXE 3 — geo  (POINT DE DÉFAILLANCE physique : où est l'usine/le siège. Unique.)
# ════════════════════════════════════════════════════════════════════════════
geos:
  - taiwan
  - japan
  - korea
  - us
  - europe
  - uk
  - china
  - china_exposed              # siège hors-Chine mais opérations/revenus Chine
  - global

# ════════════════════════════════════════════════════════════════════════════
# AXE 4 — status  (DÉTENU vs PROJETÉ. Jamais confondu dans une vue de risque.)
# ════════════════════════════════════════════════════════════════════════════
statuses:
  - held                       # détenu — entre dans le calcul de concentration réelle
  - planned                    # watchlist / file d'achats — vue distincte, hors risque actuel
  - sorti                      # liquidé — exclu du mapping actif

