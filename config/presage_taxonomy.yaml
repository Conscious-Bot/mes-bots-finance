# ════════════════════════════════════════════════════════════════════════════
# RÈGLE DE LECTURE (non négociable — réconcilie trous & précision)
#
#   • layer_primary  → COMPTE (poids d'une couche, somme à 100% sur le dashboard).
#   • layer (liste)  → COUVRE (détection de trous, ne somme pas).
#   • TROU = une sous-couche absente de la liste `layer` de TOUTE position held —
#            même si elle est le primary de personne.
#       → networking/chip_interconnect COUVERT (Astera primary + Broadcom secondaire) : PAS un trou.
#       → energy/transmission COUVERT en held (Schneider primary + GEV secondaire) : PAS un trou.
#       → assembly/substrate & substrate_film : couverts seulement en PLANNED (Ibiden, Ajinomoto) : TROU.
#       → assembly/molding_equip : dans AUCUNE liste held ni planned : TROU ouvert (Towa).
#
# NOTE concentration : driver=ai_capex held inclut la DEMANDE (AMZN/GOOGL hyperscalers)
#   ET l'OFFRE qui la sert. Pari à variable unique assumé. Le chiffre ne MONTE pas vs
#   le risk-side (kill_switch comptait déjà ces tickers) — il devient VISIBLE sur les
#   pages Positions/Concentration. C'est l'alignement UI↔risk, pas un changement de poids.

# ════════════════════════════════════════════════════════════════════════════
# AGRÉGATION HIGH-LEVEL — Brier bucket (5 buckets, Phase 3/C, 26/06/2026 figé).
#   Source unique pour intelligence/brier_audit.py + /review TICKER cyclicality
#   + dashboard cycle_phase chips. Supersède config/sectors.yaml (tué Phase 3).
#
# Format de chaque bucket :
#   label        : nom affiché (handler /review, panneau)
#   index        : index benchmark (Brier comparatif sectoriel)
#   cycle_phase  : early | mid | late | contraction (vue signée user, MAJ trimestrielle)
#   cycle_note   : commentaire qualitatif (affiché chip + handler)
#   by_category  : layer-mère du mapping → bucket (résolution par défaut)
#   tickers      : tickers FORCÉS dans ce bucket (overrides historiques OU
#                  tickers hors-mapping à préserver)
#
# Logique de résolution (taxonomy.sector_highlevel_info) :
#   1. Si ticker apparaît dans bucket.tickers → return ce bucket (priorité au 1er)
#   2. Sinon, layer-mère(ticker) ∈ by_category[bucket] → return bucket
#   3. Sinon None
#
# Préservation historique Brier (snapshot AVANT-Phase-3 du 26/06/2026) :
#   AMZN/GOOGL → tech_mega (pas semis malgré compute/hyperscaler — l'historique
#   Brier les a toujours classés tech_mega, on préserve)
#   MP → energy_commodities (pas semis malgré materials/rare_earths)
#   AMD/NVDA/ARM/TSLA → buckets historiques (pas au mapping principal mais
#   présents en historique prédictions)
# ════════════════════════════════════════════════════════════════════════════
