    - defense_budget_yoy
    - export_authorizations
    - program_milestones
  crowding_proxies:
    - ITA
    - PPA
  invalidation_template:
    - "backlog stagne >2 trimestres"
    - "défense budget cut >5%"
    - "program canceled"
  cycle_role: defensive
  evidence_tier: A
  audit_metadata:
    holdings_validated: []
    notes: "MHI dans book (Industrials/Defense thème). Prior tier-A, à migrer S si MHI résolvé."

consumer.staples:
  cyclicality: defensive
  criticality: moat              # brand + distribution
  macro_factor: "Consumer cyclical"   # paradoxe : staples mais sensible aux taux
  deliverable_kpis:
    - organic_growth
    - gross_margin
    - market_share
    - input_costs_yoy
  crowding_proxies:
    - XLP
    - VDC
  invalidation_template:
    - "organic growth négatif 2 quarters"
    - "market share loss matériel"
    - "margin compression >200bp"
  cycle_role: defensive
  evidence_tier: A
  audit_metadata:
    holdings_validated: []
    notes: "Pas de staples holding. Prior littérature."

# ════════════════════════ TIER B (défaut générique, sous-industrie obscure) ══

GENERIC_UNCLASSIFIED:
  cyclicality: moderate          # défaut neutre
  criticality: commodity         # défaut neutre (no moat assumed)
  macro_factor: "Other"
  deliverable_kpis: []           # vide -> moteur micro flag "no_kpis"
  crowding_proxies: []
  invalidation_template:
    - "thèse non-falsifiable (pas de KPIs sectoriels définis)"
  cycle_role: unknown
  evidence_tier: B
  audit_metadata:
    holdings_validated: []
    notes: "Profil défaut quand sous-industrie non-mappée. Le moteur micro ne peut PAS lire ce ticker -- flag UNCLASSIFIED."
