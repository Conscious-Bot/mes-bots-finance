    - "reserves_replacement < 100%"
    - "production miss > 5% sur guidance"
  cycle_role: mid_cyclical
  evidence_tier: A
  audit_metadata:
    holdings_validated: []
    notes: "Pas de holding upstream actif. Prior littérature."

