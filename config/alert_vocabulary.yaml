# Vocabulaire d'alerte canonique (substrat sémantique)
# Cf SPEC_ALERT_VOCABULARY.md
#
# 4 classes orthogonales :
#   STATE   : décrit OÙ une chose est (contexte). earns_attention=false TOUJOURS.
#   STEER   : conclut QUOI faire. act-class earns_attention=true ; calm-class false.
#   FLAG    : condition qui contraint. earns_attention=true quand actif.
#   EVENT   : delta -- quelque chose vient de changer. earns_attention=true.
#
# Règle structurelle : l'attention provient UNIQUEMENT de
#   {EVENT} ∪ {FLAG actif} ∪ {STEER act-class}.
# STATE n'attire JAMAIS -- gravé dans le validator Pydantic.
#
# Schéma de chaque mot :
#   class                : state | steer | flag | event   (discriminator Pydantic)
#   earns_attention      : bool                            (forcé selon class)
#   meaning              : str (description user-readable)
#   calibration_contract : dict obligatoire si class=event ; optionnel sinon
#     trigger              : str (condition qui le tire)
#     delta_based          : bool (event = delta toujours true)
#     outcome_validated    : str (comment l'event prouve sa pertinence)
#   render               : dict
#     color    : token sémantique (calm | info | warning | danger | critical | neutral)
#     icon     : nom (trending-down, alert-triangle, ...)
#     weight   : low | medium | high (poids visuel)
#   action_hint          : str (suggestion d'action pour le user)
#
# Note 08/06 : aucun panel ne hardcode de couleur d'alarme. Gate CI verrouille.

vocabulary_version: "1.0"
schema_version: "1.0"

# === STATE (descriptif, calme, earns_attention=false TOUJOURS) ==================

