# Mapping ticker -> secteur + index benchmark + phase cycle (user-signed view).
#
# Source de verite UNIQUE pour le handler /review TICKER et tous les futurs
# outils qui ont besoin du contexte sectoriel.
#
# Convention phase cycle (extraite de [[business-path-6-acted]] doctrine,
# wedge = discipline mecanisee, ta vue signee, jamais LLM-estimee) :
#   - early      : debut de cycle, demande en hausse rapide, valos basses, oppose
#   - mid        : cycle etabli, demande soutenue, valos justes
#   - late       : capex peak imminent, valos extended, AI hype priced-in
#   - contraction: demande qui faiblit, margin compression, derisking attendu
#
# Mise a jour : a faire trimestriellement (post-J-day, ~01/09 prochaine).
# Toute modification = commit explicite avec justification dans le message.
#
# Cree 06/06/2026 (chantier /review TICKER).

sectors:
