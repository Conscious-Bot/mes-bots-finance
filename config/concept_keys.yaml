# LIVING GRAPH W0 — registre des concepts sémantiques + tolérance ε par concept.
#
# Cf SPEC_LIVING_GRAPH.md §2 (tolérance ε) :
# - Anti-cry-wolf : fork = |a−b|/|a| > epsilon_rel ; sinon = jitter, pas fork
# - PMP doit être exact (calcul déterministe sur ledger), ε strict 0.001
# - value_eur/pnl tolèrent micro-jitter FX intra-regen (ε 0.005)
# - signaux qualitatifs (fragility) tolèrent 5%
#
# asof_bucket : granularité temporelle pour regrouper les "candidats" d'un même fait.
# - day : default, idéal pour PMP/value qui ne devraient pas changer intra-jour
# - hour : pour signaux temps-réel (futur, pas en V0)
#
# V0 = pmp_eur uniquement (tracer-bullet PMP sur le cas L29).
# W1 étendra à value_eur, weight_pct, pnl_position, current_price_eur.

version: 1

concepts:
  pmp_eur:
    description: "PMP roulant fiscal FR en EUR (cf shared/ledger_pmp.py)"
    asof_bucket: day
    epsilon_rel: 0.001  # 0.1% — PMP est un calcul exact, micro-diff = fork

  value_eur:
    description: "Valeur position EUR (qty x price x fx) -- canonique book.value_eur()"
    asof_bucket: day
    epsilon_rel: 0.005  # 0.5% — tolère micro-jitter FX/price intra-jour entre producteurs

  pnl_position:
    description: "P&L position % EUR ((value_now - cost_basis) / cost_basis) -- la divergence gauge dot-vs-tooltip"
    asof_bucket: day
    epsilon_rel: 0.005  # 0.5% — même tolérance que value_eur (dérivé direct)

  price_eur:
    description: "Prix EUR live d'un ticker -- comparaison position_view.price_native*fx vs _cached_price_eur"
    asof_bucket: day
    epsilon_rel: 0.005  # 0.5% — tolère jitter FX/price refresh entre cron (DB cache) et yfinance live (process cache)

  qty:
    description: "Quantité d'unités d'un ticker -- positions VIEW vs ledger raw SUM(BUY-SELL)"
    asof_bucket: day
    epsilon_rel: 0.0001  # 0.01% strict — qty doit être exact (déterministe), toute divergence = bug structurel

  cost_basis_eur:
    description: "Cost basis position EUR -- book avg_cost*qty vs ledger_pmp FIFO français CGI"
    asof_bucket: day
    epsilon_rel: 0.01  # 1% — la VRAIE divergence sur partial-close (avg vs FIFO). C'est le signal cherché.

  fx_rate_to_eur:
    description: "Taux FX native→EUR -- positions DB cached vs prices.fx gateway live"
    asof_bucket: day
    epsilon_rel: 0.005  # 0.5% — jitter FX intra-day OK, divergence > 0.5% signale cron stale
