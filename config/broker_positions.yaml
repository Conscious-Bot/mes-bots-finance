# Positions broker -- SOURCE CANONIQUE DECLARATIVE (L17 YAML).
#
# CETTE LISTE EST LA VÉRITÉ. La table SQLite positions = cache derive via
# scripts/sync_positions_from_broker.py. Quand le broker change, on edite
# CE FICHIER (pas le DB), puis on re-run le script.
#
# Pourquoi : avant ce pattern, refresh_positions_2026_05_23.py etait un
# script daté one-shot qui calculait qty depuis yfinance au moment de l'exec.
# Les valeurs dérivaient avec le temps (FX, prix), et le DB devenait incoherent
# avec le broker en quelques jours. Apparu 10x recurrent, frustration legitime.
#
# Cure canonique : YAML versionne git = source unique. Toute discrepance
# dashboard vs broker se resoud en editant CE FICHIER et re-running le sync.
# Pas de devine-la-qty depuis yfinance. Pas de double conversion FX. Pas de
# stale cache.
#
# Convention :
#   - avg_cost_eur : prix unitaire EN EUR/share (PRU broker, deja en EUR
#     coherent avec ce que le user voit dans son broker).
#   - qty : qty native broker (ex. 3 actions ASML.AS, 4.212 fractional AMD).
#     Si qty fractionnaire et value+pnl% suffisent, on peut omettre qty et
#     le sync derivera : qty = value_eur / (current_price_eur).
#   - value_eur_snapshot + pnl_pct_snapshot : OPTIONNELS, sert de check
#     verrouillant (sync verifie que dashboard.value_eur == value_eur_snapshot
#     a +/- 0.5% sinon flag).
#
# Tous les champs en EUR (devise base). Pas de native USD/JPY/KRW ici --
# le broker fait deja la conversion et nous montre EUR.
#
# Source de ces valeurs (08/06 19:37 + 19:54) :
#   - PEA : Boursorama screenshot
#   - TR  : Trade Republic screenshots

