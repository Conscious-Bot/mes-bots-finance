# Risque panel - source dashboard/render.py _rows_risque
# AUDIT v5 : WRONG STRUCTUREL. heat = max(tensions) sous-estime risque agrégé.
# Convention pro (Pro Trader Dashboard / MartinKronicle / Van Tharp / Elder) :
# portfolio heat = SOMME des risques = Σ(tension × weight × correlation_factor).
# Quand correlations spike en crash, toutes les tensions s'additionnent.
# FIX APPLIQUE v5 dans dashboard/render.py : heat_aggregated remplace heat_max.
risk_thresholds:
  near_stop_pct: 10.0        # downside_pct < 10 = near-stop danger (red dot, OK swing PM)
  watch_zone_pct: 20.0       # downside_pct < 20 = warn yellow ; >= 20 = calm
  tension_scale: 20.0        # tension_i = max(0, (20 - downside_i) / 20)
  bar_full_at_pct: 30.0      # buf scale : downside/30 * 100 capped 0-100
  # NEW v5 : portfolio heat seuils (consensus pro retail / institutional)
  portfolio_heat_calm_max_pct: 3.0    # <3% capital at risk = calm
  portfolio_heat_warn_max_pct: 6.0    # 3-6% = warn (zone consensus retail)
  portfolio_heat_danger_min_pct: 6.0  # >6% danger (Elder rule -6% = stop trading mois)
  elder_circuit_breaker_pct: 6.0      # -6%/mois portfolio drawdown = stop trading (Elder)

# Concentration caps - source config.yaml original (style+risk+user_strategy)
# DUPLIQUE PROVISOIREMENT ICI pour visibilite audit + canonical migration future.
# Migration finale : retirer de config.yaml une fois lecteurs migres a shared.calibration.
concentration_caps:
  line_cap_by_conviction:    # taille max par ligne EUR % book par niveau conviction
    c5: 8.0                  # 8% max single position pour conviction 5
    c4: 6.0
    c3: 4.5
    c2: 3.0
    c1: 2.0
  sector_max_pct: 20.0       # max single sector % book
  narrative_max_pct: 30.0    # max single narrative theme % book
  cluster_max_pct: 35.0      # max single cluster % book (default)
  user_cluster_target_pct: 70.0  # OVERRIDE user_strategy (compounder de conviction supercycle reel)
  user_decorrelation_target_pct: 15.0  # cible autres paris
  # NEW v5 : AUTO-DERISK trigger en STRESS regime (audit pro recommendation)
  # Précédents historiques (Druckenmiller/Soros) : concentration EXTREME OK en
  # conviction macro PLUS monitoring obsessionnel. Pour solofounder en phase
  # construction sans la machine, STRESS confirmé = sécuriser tail risk.
  stress_regime_max_cluster_pct: 55.0  # force cap a 55% si regime = STRESS
  min_open_positions: 8                # garde-fou anti-overdilution (sweet spot CANSLIM/Minervini 8-20)

# Risk management thresholds - source config.yaml risk:
# AUDIT v5 : ACCURATE seuils stop/reduce (aligne Minervini SEPA + PM conviction).
# VIX 21 threshold legerement bas vs pro consensus (20 round number).
# MISSING : 2-tier VIX scaling (panic regime > 30 = halve exposure).
drawdown_thresholds:
  reduce_at_pct: 8.0         # -8% drawdown : reduce (aligne Minervini)
  stop_at_pct: 20.0          # -20% drawdown : exit (PM conviction; max DD acceptable Minervini)
  max_open_positions: 15     # plafond positions tenues (CANSLIM 8-20 range)
  vol_scaling_vix_threshold: 21.0   # VIX > 21 -> apply 0.7x (CTA convention zone)
  vol_scaling_factor: 0.7    # multiplie sizing par 0.7
  # NEW v5 : 2e palier VIX panique (convention CTA 2-tier)
  vol_scaling_vix_panic_threshold: 30.0  # VIX > 30 -> halve exposure
  vol_scaling_vix_panic_factor: 0.5      # convention pro: -50% sizing en panique
  # NEW v5 : portfolio circuit breaker (Elder rule)
  portfolio_monthly_dd_circuit_breaker_pct: 6.0  # -6% mois => stop new positions

# Grade portfolio bands - source intelligence/portfolio_grade.py GRADE_BANDS + hard gates
grade_bands:
  A_plus: 90
  A: 85
  A_minus: 80
  B_plus: 75
  B: 70
  B_minus: 65
  C_plus: 60
  C: 55
  C_minus: 50

# Grade hard gates (caps appliques au score overall avant score_to_grade)
# Source : intelligence/portfolio_grade.py compute_grade()
grade_gates:
  cluster_cap_over_2x_cap: 65          # Pari principal > 2x cible user -> note cap a B-
  cluster_cap_over_1_5x_cap: 78        # Pari principal > 1.5x cible -> note cap a B+
  calibrage_under_50_cap: 60           # sizing_conviction < 50 -> C+
  calibrage_under_70_cap: 75           # sizing_conviction < 70 -> B
  decorrelation_under_0_3x_cap: 60     # autres paris < 0.3x cible -> C+
  decorrelation_under_0_6x_cap: 72     # autres paris < 0.6x cible -> B-
  solidite_under_0_4x_cap: 65          # qualite haute < 0.4x cible -> B-
  cycle_valo_over_2_5x_cap: 65         # cycle/valo > 2.5x cible -> B-
