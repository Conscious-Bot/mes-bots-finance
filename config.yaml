style:
  default_horizon: 6m
  conviction_min: 3
  # position_max_pct LEGACY RETIRE 07/06 (TODO #73 partie 1 done).
  # Source unique du cap par ligne = concentration.line_cap_by_conviction
  # via shared/sizing_caps.cap_for_conviction(conv). Plafond absolu disponible
  # via absolute_max_cap() = cap c5. Aucun reader n'utilise plus style.position_max_pct.
  sector_max_pct: 0.2
  narrative_max_pct: 0.3
risk:
  drawdown_reduce_pct: 0.08
  drawdown_stop_pct: 0.2
  max_open_positions: 15
  # 06/06 v3 : 25 -> 20 -> 21 (+5% margin). Aligne sur VIX_STRESS classifier.
  vol_scaling_threshold_vix: 21
  vol_scaling_factor: 0.7
  validate_enabled: false
  # Carte-decision #1 etape 4 : budget-ruine NAV-at-risk par nom.
  # Sub-Kelly N<100 : sizing honnete bride par asymetrie x evitement-de-ruine,
  # PAS conviction-only. Sur 53k€ book : 1.5% = ~795€ downside max par nom.
  # Target-edge-adjusted = min(target-conv, ruin_budget / |downside_pct|).
  ruin_budget_per_name_pct: 0.015
  # ADD steer par defaut DESACTIVE (anti-FOMO red-team user 07/06 (a) :
  # ne construis aucun signal d'alpha/prediction). ADD requiert opt-in explicite.
  allow_add_steer: false

# =============================================================================
# STRATEGIE UTILISATEUR DECLAREE (Sprint 19, 29/05/2026)
# Source : conversation chat avec le user "78% n'est pas un bug, c'est ma these
# macro. Tu es un compounder de conviction sur un supercycle reel". Encode
# explicitement ce que l'user accepte vs ce qu'il refuse.
# =============================================================================
user_strategy:
  archetype: "concentrator_thematic"
  description: >
    Conviction compounder on a real supercycle (AI capex). Sectoral concentration
    is DELIBERATE, not a violation. Other bets (defense, uranium, LNG, rare earths)
    are tactical decorrelators, not large-cap diversification.
  # Cibles personnalisees (remplacent les defaults config.yaml.concentration)
  target_cluster_cap_pct: 70
  target_decorrelation_pct: 15
  # Macro factors que l'user ACCEPTE en concentration (pas de gate sur ceux-la)
  accepted_concentrated_factors:
    - "AI capex"
    - "AI inference/compute demand"
  # Benchmark pertinent pour TON book (pas un index large-cap diversifie)
  benchmark_ticker: "SOXX"  # iShares Semiconductor ETF (vs SPY trop large)
  benchmark_fallback: "^SOX"
  # Horizon thesis-driven
  thesis_horizon_years: 7  # 5-10 ans range
  # Quand le user a parle de ca pour la derniere fois
  declared_at: "2026-05-29"
  # Validation explicite de la tolerance drawdown (2026-05-29) :
  # User arbitrage : cluster cap 75% -> 70%, valide -21% drawdown sur
  # scenario AI capex -30% (= ~-11k€ aujourd'hui, ~-15k€ a la cible 70k).
  # Discipline : tolere ce drawdown avec book complet sur cible, refuse
  # 75% qui impliquait -23%. Le dashboard CTA passe en bandeau vert.
  drawdown_tolerance_validated: true
  drawdown_tolerance_validated_at: '2026-05-29'
  # Phase construction : le book actuel n'est PAS l'etat final. Cible
  # documentee 70 180€ / ~33 positions. Les decorrelants (Energie-pour-IA,
  # Defense, Robotique) sont en cours d'ajout. Tant que ce flag est true,
  # les lectures hardcore de cluster_cap / ballast_strict / risk_watch
  # restent informatives, pas actionnables. On ne pousse pas a trim.
  construction_phase: true
  target_capital_eur: 70180
  target_positions_count: 33
  construction_completed_at: null

concentration:
  # Policy de concentration -- DEFAULT 35% conservateur (ADR 010, 26/05/2026).
  # GATE SUSPENDU pour cet user : user_strategy.target_cluster_cap_pct prend le
  # dessus si l'user_strategy.archetype == "concentrator_thematic".
  # Gouverneur = cap de CLUSTER correle, pas le cap par ligne.
  assumed_cluster_shock: 0.57
  cluster_max_pct: 0.35
  # Pente compressee sub-Kelly tant que N<100 (M3 QUALITY_BAR + L19).
  # Ce n'est PAS la pente "vraie" : les hit-rates par conviction ne sont pas
  # mesures. La pente sera REMPLACEE par les hit-rates empiriques mesures
  # post N>=30 J+90 (cf TODO #73, doctrine "cap = resultat mesure, pas
  # parametre choisi"). Aujourd'hui :
  #   - Forme : concave compressee (ratio inter-tiers stable ~0.80)
  #   - Ancre : c5 = 6% (sommet bride vs 8% historique, sub-Kelly transitoire)
  #   - Les % absolus sont du second ordre ; la FORME (ratios) est l'invariant.
  line_cap_by_conviction:   # taille max par ligne = f(conviction); remplace style.position_max_pct
    5: 0.060   # ancre courante
    4: 0.048   # x0.80
    3: 0.038   # x0.79
    2: 0.030   # x0.79
    1: 0.024   # x0.80
  clusters:
    # semis_ai = correles sur le capex AI / cycle semi (foundry, litho, EDA, memoire,
    # equipement, materiaux, connectivite). Hyperscalers (AMZN/GOOGL) et power-for-AI
    # (VRT/CCJ/CEG/VST/GEV) sont AI-adjacents, suivis hors cap (drivers distincts).
    compute_ai:
      - NVDA
      - AVGO
      - TSM
      - MU
      - ASML
      - ASML.AS
      - AMD
      - ARM
