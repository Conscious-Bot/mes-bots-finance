<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" fill="currentColor" role="img" aria-label="PRESAGE">
  <title>PRESAGE</title>
  <desc>Brand mark : 4-pointed sparkle elongue vertical + halo + 7 dots signal droite + wordmark. Canonical, do not alter.</desc>
  <defs>
    <radialGradient id="psg-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="currentColor" stop-opacity=".9"/>
      <stop offset="40%" stop-color="currentColor" stop-opacity=".35"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="psg-vline" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0"/>
      <stop offset="40%" stop-color="currentColor" stop-opacity=".95"/>
      <stop offset="60%" stop-color="currentColor" stop-opacity=".95"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="psg-hline" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="currentColor" stop-opacity="0"/>
      <stop offset="38%" stop-color="currentColor" stop-opacity=".95"/>
      <stop offset="62%" stop-color="currentColor" stop-opacity=".95"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="psg-flare-r" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="currentColor" stop-opacity=".75"/>
      <stop offset="100%" stop-color="currentColor" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Halo radial central (lumiere qui rayonne) -->
  <circle cx="120" cy="90" r="48" fill="url(#psg-halo)" opacity=".55"/>
  <circle cx="120" cy="90" r="22" fill="url(#psg-halo)" opacity=".85"/>
  <!-- Axe vertical : tres long, tres fin -->
  <rect x="118.5" y="6" width="3" height="168" fill="url(#psg-vline)"/>
  <!-- Axe horizontal : plus court, fin (proportion ~0.55 du vertical) -->
  <rect x="58" y="89" width="124" height="2" fill="url(#psg-hline)"/>
  <!-- Coeur lumineux central -->
  <circle cx="120" cy="90" r="3.6" fill="currentColor"/>
  <circle cx="120" cy="90" r="1.4" fill="currentColor" opacity="1"/>
  <!-- Flare droite + 7 dots fading (signal qui se propage) -->
  <rect x="182" y="89.3" width="16" height="1.4" fill="url(#psg-flare-r)" opacity=".8"/>
  <circle cx="194" cy="90" r="3.0" opacity=".85"/>
  <circle cx="205" cy="90" r="2.5" opacity=".70"/>
  <circle cx="214" cy="90" r="2.0" opacity=".55"/>
  <circle cx="221" cy="90" r="1.6" opacity=".42"/>
  <circle cx="227" cy="90" r="1.3" opacity=".30"/>
  <circle cx="232" cy="90" r="1.0" opacity=".20"/>
  <circle cx="236" cy="90" r="0.7" opacity=".12"/>
  <!-- Wordmark PRESAGE espace -->
  <text x="120" y="232" text-anchor="middle"
        font-family="'Geist', 'Inter', system-ui, sans-serif"
        font-size="22" font-weight="300"
        letter-spacing="9" fill="currentColor" opacity=".92">PRESAGE</text>
</svg>
