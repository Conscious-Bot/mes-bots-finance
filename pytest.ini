[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    slow: network-dependent or LLM-call tests (skip default, run pre-release)
    live_data: tests qui lisent storage.DB_PATH (data/bot.db) -- gitignored, absent en CI.
        Marker ajoute 06/06 quand on a realise que CI etait rouge depuis toujours pour
        cette raison (sqlite3.OperationalError: no such table). CI skip via
        `-m "not slow and not live_data"`. Tirer en local avec `pytest -m live_data`.
